{% assign lang = include.lang %}
{% assign i18n = site.data.i18n %}
<header class="site-header">
  <div class="header-inner">
    <a href="{% if lang == 'de' %}{{ '/de/' | relative_url }}{% else %}{{ '/' | relative_url }}{% endif %}" class="site-brand">
      <img src="{{ '/assets/meeple-map-icon.svg' | relative_url }}" alt="" class="site-logo">
      <div class="site-brand-text">
        <span class="site-title">BoardGameClubs<span class="site-title-tld">{{ i18n.brand_suffix[lang] }}</span></span>
        <span class="site-tagline">{{ i18n.tagline[lang] }}</span>
      </div>
    </a>
    {% include nav-links.html lang=lang %}
  </div>
</header>
