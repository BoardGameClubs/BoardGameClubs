name: Add a Club
description: Submit your board game club to be added to the directory
title: "Add club: "
labels: ["new club"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for submitting your club! Fill in as much as you can and we'll take care of the rest.

  - type: dropdown
    id: country
    attributes:
      label: Country
      description: Which country's directory should this club be listed in?
      options:
        - United Kingdom (GB)
        - Germany (DE)
        - Austria (AT)
        - Switzerland (CH)
        - Netherlands (NL)
        - Belgium (BE)
        - Italy (IT)
        - Poland (PL)
        - France (FR)
        - Denmark (DK)
        - Spain (ES)
        - Finland (FI)
        - Other (tell us in the description)
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: Club name
      placeholder: e.g. Wakefield Warriors
    validations:
      required: true

  - type: dropdown
    id: days
    attributes:
      label: What day(s) do you meet?
      multiple: true
      options:
        - Monday
        - Tuesday
        - Wednesday
        - Thursday
        - Friday
        - Saturday
        - Sunday
        - Various
    validations:
      required: true

  - type: input
    id: time
    attributes:
      label: Time
      description: Use whichever clock format is natural for your country.
      placeholder: e.g. 7:00pm - 10:00pm or 19:00 - 22:00
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: How often do you meet?
      options:
        - Weekly
        - Fortnightly
        - Twice monthly
        - Monthly
        - Ad-hoc
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: What type of club is it?
      description: Select all that apply. Leave blank for a general board game club.
      multiple: true
      options:
        - Board Games
        - RPG
        - Wargames
        - BOTC
        - TCG

  - type: input
    id: venue_name
    attributes:
      label: Venue name
      placeholder: e.g. The King's Arms
    validations:
      required: true

  - type: input
    id: address
    attributes:
      label: Venue address (including postcode / ZIP)
      placeholder: Street, city, postcode
    validations:
      required: true

  - type: input
    id: cost
    attributes:
      label: Cost
      description: 'In your local currency. Examples: "Free", "£2", "£5 (first session free)", "€3", "5 zł", "20 kr", "CHF 5".'
      placeholder: e.g. Free, £2, €3, 5 zł, 20 kr
    validations:
      required: true

  - type: input
    id: website
    attributes:
      label: Website
      placeholder: https://

  - type: input
    id: meetup
    attributes:
      label: Meetup group
      placeholder: https://www.meetup.com/...

  - type: input
    id: facebook
    attributes:
      label: Facebook page or group
      placeholder: https://facebook.com/...

  - type: input
    id: discord
    attributes:
      label: Discord invite link
      placeholder: https://discord.gg/...

  - type: input
    id: bgg
    attributes:
      label: BoardGameGeek link
      placeholder: https://boardgamegeek.com/...

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Tell us about your club. What games do you play? Are newcomers welcome?
      placeholder: We're a friendly group who play a wide range of board games...
    validations:
      required: true

  - type: textarea
    id: image
    attributes:
      label: Club logo or image
      description: Drag and drop an image here, or paste a URL. PNG or JPG, ideally square.
