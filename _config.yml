title: Board Game Clubs
description: >-
  Find your nearest board game, RPG, wargaming, Blood on the Clocktower, and TCG
  club. A free, community-maintained directory of tabletop gaming clubs with
  interactive maps for the UK, Germany, and other European countries.
url: "https://boardgameclubs.org"
baseurl: ""
repository: "BoardGameClubs/BoardGameClubs_Web"
og_image: /assets/og.png

collections:
  clubs:
    output: true
    permalink: /clubs/:slug/

defaults:
  - scope:
      path: ""
      type: "clubs"
    values:
      layout: "club"
      language: "en"
      default_country: "GB"
  - scope:
      path: ""
    values:
      language: "en"
      default_country: "GB"
  - scope:
      path: "de"
    values:
      language: "de"
      default_country: "DE"
  - scope:
      path: "_clubs"
      type: "clubs"
    values:
      language: "en"
      default_country: "GB"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CONTRIBUTING.md
  - initial_club_data.md
  - vendor
  - node_modules
  - scripts
  - _clubs_drafts
