title: BoardGameClubs.org
description: >-
  Find your nearest board game, RPG, wargaming, Blood on the Clocktower, and TCG
  club. A free, community-maintained directory of tabletop gaming clubs with
  interactive maps.
url: "https://boardgameclubs.org"
baseurl: ""
repository: "BoardGameClubs/BoardGameClubs"
og_image: /assets/og.png

# Cache unchanged pages between dev rebuilds so chrome/SCSS/JS edits rebuild in
# a fraction of the ~45-50s full build. Affects `jekyll serve` only; CI/Pages
# builds are full builds.
incremental: true

collections:
  clubs:
    output: true
    permalink: /clubs/:slug/

defaults:
  - scope:
      path: ""
      type: "clubs"
    values:
      layout: "club"
      language: "en"
      default_country: "GB"
  - scope:
      path: ""
    values:
      language: "en"
      default_country: "GB"
  - scope:
      path: "de"
    values:
      language: "de"
      default_country: "DE"
  - scope:
      path: "it"
    values:
      language: "it"
      default_country: "IT"
  - scope:
      path: "fr"
    values:
      language: "fr"
      default_country: "FR"
  - scope:
      path: "es"
    values:
      language: "es"
      default_country: "ES"
  - scope:
      path: "pl"
    values:
      language: "pl"
      default_country: "PL"
  - scope:
      path: "_clubs"
      type: "clubs"
    values:
      language: "en"
      default_country: "GB"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CONTRIBUTING.md
  - initial_club_data.md
  - vendor
  - node_modules
  - scripts
  - _clubs_drafts
