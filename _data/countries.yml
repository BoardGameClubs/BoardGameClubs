  name_fr: "Royaume-Uni"
  name_es: "Reino Unido"
  name_pl: "Wielka Brytania"
  url_prefix: "" # GB clubs live at /clubs/... (no prefix)
  map_center: [54.5, -3.5]
  map_zoom: 6
  bounds:
    lat: [49.0, 61.0]
    lng: [-9.0, 3.0]
  units: "miles"
  unit_label: "mi"
  earth_radius: 3959
  postcode:
    service: "postcodes_io"
