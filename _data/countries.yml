# Per-country profile. Used by templates, JS modules (via window.GameClubCountries),
# scripts/validate_clubs.rb, and scripts/geocode.rb.
#
# Two distinct concepts:
#   - page.language ("en" | "de" | "it" | "fr" | "es" | "pl") drives the UI
#     strings — comes from the URL (/ = en, /de/ = de, etc.). Independent of
#     the active country.
#   - active country (chosen by URL ?country=, localStorage, or the nav
#     selector — falling back to default_country_for_language) drives the
#     dataset, map centre/zoom, units, postcode service, currency.
#
# Add a new country by adding a key here (ISO 3166-1 alpha-2, lowercase) and
# new translation keys in _data/i18n.yml.

gb:
  code: "GB"
  name_en: "United Kingdom"
  name_de: "Vereinigtes Königreich"
  name_it: "Regno Unito"
  name_fr: "Royaume-Uni"
  name_es: "Reino Unido"
  name_pl: "Wielka Brytania"
  url_prefix: "" # GB clubs live at /clubs/... (no prefix)
  map_center: [54.5, -3.5]
  map_zoom: 6
  bounds:
    lat: [49.0, 61.0]
    lng: [-9.0, 3.0]
  units: "miles"
  unit_label: "mi"
  earth_radius: 3959
  postcode:
    service: "postcodes_io"
    regex: "^[A-Z]{1,2}\\d"
  distance_options: [5, 10, 25, 50]
  currency: "GBP"
  currency_symbol: "£"
  geocode_country_code: "GB"

